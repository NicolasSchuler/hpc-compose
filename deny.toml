[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = [
  # `indicatif` still depends on `number_prefix`; this is an unmaintained advisory,
  # not a memory-safety or code-execution issue, and there is no patched release to upgrade to.
  "RUSTSEC-2025-0119",
]

[licenses]
version = 2
confidence-threshold = 0.9
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
]

[bans]
multiple-versions = "allow"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
