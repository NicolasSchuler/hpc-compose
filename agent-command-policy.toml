effects = ["local-read", "sensitive-output"]
summary = "Render a fabric smoke script without submitting it."

[[commands.overrides]]
flags = ["--script-out"]
authorization_tier = "scoped-local-mutation"
add_effects = ["local-write"]
description = "Writes the rendered probe script to the requested path."

[[commands.overrides]]
flags = ["--submit"]
authorization_tier = "explicit-quota"
add_effects = ["local-write", "executes-user-code", "scheduler-read", "scheduler-submit", "polls"]
description = "Submits and waits for the fabric probe."

[[commands]]
path = "doctor mpi-smoke"
authorization_tier = "automatic-read-only"
effects = ["local-read", "sensitive-output"]
summary = "Render an MPI smoke script without submitting it."

[[commands.overrides]]
flags = ["--script-out"]
authorization_tier = "scoped-local-mutation"
add_effects = ["local-write"]
description = "Writes the rendered probe script to the requested path."

[[commands.overrides]]
flags = ["--submit"]
authorization_tier = "explicit-quota"
add_effects = ["local-write", "executes-user-code", "scheduler-read", "scheduler-submit", "polls"]
description = "Submits and waits for the MPI probe."

[[commands]]
path = "doctor readiness"
