[[commands]]
path = "new"
authorization_tier = "scoped-local-mutation"
effects = ["local-write"]
summary = "Write a starter spec. `init` is the CLI alias for this command; apply this entry to it."

[[commands.overrides]]
flags = ["--list-templates"]
authorization_tier = "automatic-read-only"
remove_effects = ["local-write"]
description = "Lists built-in templates without writing a spec."

[[commands.overrides]]
flags = ["--describe-template"]
