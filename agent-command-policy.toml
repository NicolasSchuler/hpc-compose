effects = ["local-read"]
summary = "Validate and build a redacted static plan without touching Slurm."

[[commands.overrides]]
flags = ["--show-script"]
add_effects = ["sensitive-output"]
description = "Prints the generated script, which can contain commands, paths, and expanded values. Prefer explain; do not ingest unredacted script output."

[[commands]]
path = "preflight"
authorization_tier = "automatic-read-only"
effects = ["local-read", "scheduler-read"]
summary = "Check submission-host prerequisites without submitting by default."

[[commands.overrides]]
flags = ["--fs-probes"]
authorization_tier = "explicit-quota"
add_effects = ["local-write", "executes-user-code", "scheduler-submit", "scheduler-cancel", "polls"]
description = "Submits a tiny Slurm job to probe shared filesystem behavior."

[[commands]]
path = "prepare"
