summary = "Continuously display scheduler state and logs for a tracked run."

[[commands]]
path = "weather"
authorization_tier = "automatic-read-only"
effects = ["scheduler-read"]
summary = "Read one-shot cluster queue, node, fairshare, and priority signals."

[[commands]]
path = "when"
authorization_tier = "explicit-quota"
effects = ["local-read", "local-write", "executes-user-code", "network-or-ssh", "scheduler-read", "scheduler-submit", "polls"]
summary = "Prepare, poll conditions, and submit automatically when they match."

[[commands]]
path = "workspace"
authorization_tier = "automatic-read-only"
effects = []
summary = "Command group; a subcommand is required."

[[commands]]
path = "workspace allocate"
authorization_tier = "explicit-runtime-or-external-mutation"
effects = ["local-read", "local-write", "executes-user-code"]
summary = "Allocate external site workspace storage and persist resolved facts."

[[commands]]
path = "workspace extend"
authorization_tier = "explicit-runtime-or-external-mutation"
effects = ["local-read", "local-write", "executes-user-code"]
summary = "Extend an external site workspace and refresh persisted facts."

[[commands]]
path = "workspace release"
authorization_tier = "explicit-destructive"
effects = ["local-read", "local-write", "local-delete", "executes-user-code"]
summary = "Release external site workspace storage after safety checks."

[[commands]]
path = "workspace status"
authorization_tier = "scoped-local-mutation"
effects = ["local-read", "local-write", "executes-user-code"]
summary = "Query site workspace tools, refresh persisted workspace state, and report status."
