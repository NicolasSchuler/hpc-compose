name: array-sweep-lite

# Slurm job array: one submission fans out into many independent tasks.
#
# `x-slurm.array` is passed straight through to `#SBATCH --array`. Each array
# task is a full, independent run of the job with its own SLURM_ARRAY_TASK_ID
# (Slurm injects it into every task's environment), so the command can pick its
# own slice of work from that index without any orchestration on your side.
#
# The value here is the canonical Slurm array index spec. Accepted forms include
# a single index (`3`), a range (`0-3`), a strided range (`0-9:2`), an explicit
# list (`0,3,8`), and an optional concurrency cap (`0-9%4` runs at most 4 tasks
# at once). This is a lightweight alternative to the richer `sweep:` block when
# you just want N numbered replicas from one sbatch.
x-slurm:
  job_name: array-sweep-lite
  time: "00:15:00"
  mem: 4G
  cpus_per_task: 1
  array: "0-3"
  cache_dir: ${CACHE_DIR:-/cluster/shared/hpc-compose-cache}

services:
  trial:
    image: python:3.11-slim
    command:
      - python
      - -c
      - |
        import os

        # SLURM_ARRAY_TASK_ID is set by Slurm, one distinct value per array task.
        task = int(os.environ.get("SLURM_ARRAY_TASK_ID", "0"))

        # Map the task index onto a parameter grid however you like.
        learning_rates = [0.001, 0.003, 0.01, 0.03]
        lr = learning_rates[task % len(learning_rates)]

        print(f"array_task={task} lr={lr}")
