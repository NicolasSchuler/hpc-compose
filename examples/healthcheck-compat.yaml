name: healthcheck-compat

# docker-compose `healthcheck:` sugar, normalized into hpc-compose `readiness`.
#
# hpc-compose accepts a CONSTRAINED healthcheck subset for easier migration from
# docker-compose and rewrites it into a `readiness` probe at load time. A service
# may set `healthcheck` OR `readiness`, never both. Only these test forms are
# understood, and only these:
#   - nc:   ["CMD", "nc", "-z", HOST, PORT]  or  ["CMD-SHELL", "nc -z HOST PORT"]
#           -> readiness type: tcp
#   - curl / wget --spider against an http:// or https:// URL
#           -> readiness type: http
# `healthcheck.timeout` maps to the probe's timeout_seconds. `interval`,
# `retries`, and `start_period` are NOT supported and are rejected — use an
# explicit `readiness:` block for anything richer than the above.
#
# `depends_on ... condition: service_healthy` then gates the dependent service on
# that derived readiness passing, exactly as it would against a native readiness.
x-slurm:
  job_name: healthcheck-compat
  time: "00:15:00"
  mem: 8G
  cpus_per_task: 2
  cache_dir: ${CACHE_DIR:-/cluster/shared/hpc-compose-cache}

services:
  cache:
    image: redis:7
    command: redis-server --save "" --appendonly no
    # Normalizes to: readiness { type: tcp, host: 127.0.0.1, port: 6379, timeout_seconds: 30 }
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "6379"]
      timeout: 30s
    x-slurm:
      cpus_per_task: 1

  client:
    image: redis:7
    depends_on:
      cache:
        condition: service_healthy
    command:
      - /bin/sh
      - -lc
      - |
        redis-cli -h 127.0.0.1 ping
    x-slurm:
      cpus_per_task: 1
