name: secrets-hf-token

# File-sourced secret interpolated into a service environment.
#
# The top-level `secrets:` block maps a secret name to a source. `file:` paths
# are read relative to this compose file's directory and the contents are
# trimmed; use `env:` instead to pull the value from a named environment
# variable. Each resolved secret feeds the interpolation map, so `${hf_token}`
# expands wherever interpolation runs — here into the `HF_TOKEN` environment
# variable of the `puller` service.
#
# REDACTION: resolved secret values are masked in `hpc-compose config`,
# `context`, and inspect output regardless of the secret's name, so the token
# never appears in those human-facing dumps. (The rendered submission script
# under `.hpc-compose/` still carries the literal value and is written 0600 — it
# has to, to actually reach the job.) The checked-in `./secrets/hf-token.txt`
# here is a placeholder; replace it with your real token, and keep real token
# files out of version control.
#
# REQUIRED-VAR GUARD: `HF_TOKEN` below uses the `${hf_token:?message}` form, so
# the spec fails at load time with the given message if `hf_token` resolves to
# an unset or empty value — for example an empty `./secrets/hf-token.txt` — long
# before a job could submit and die on a 401. Use `:?` to reject unset *or*
# empty; use `?` (no colon) to reject only unset. The checked-in placeholder
# file is non-empty, so this guard parses and passes here.
secrets:
  hf_token:
    file: ./secrets/hf-token.txt

x-slurm:
  job_name: secrets-hf-token
  time: "00:10:00"
  mem: 4G
  cpus_per_task: 1
  cache_dir: ${CACHE_DIR:-/cluster/shared/hpc-compose-cache}

services:
  puller:
    image: python:3.11-slim
    environment:
      HF_TOKEN: "${hf_token:?hf_token secret is empty; put a real token in ./secrets/hf-token.txt or point secrets.hf_token.env at a populated variable}"
    command:
      - /bin/sh
      - -lc
      - |
        # The value is present in-container; never echo a secret to logs.
        test -n "$HF_TOKEN" && echo "HF_TOKEN is set (value hidden)"
