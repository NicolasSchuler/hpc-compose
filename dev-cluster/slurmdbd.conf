# slurmdbd config for the local dev cluster. Backed by a MariaDB instance that
# the entrypoint bootstraps inside the same container. The entrypoint installs
# this file to /etc/slurm/slurmdbd.conf with 0600 perms (slurmdbd refuses a
# group/world-readable config).
AuthType=auth/munge
DbdHost=localhost
DbdPort=6819
SlurmUser=root

StorageType=accounting_storage/mysql
StorageHost=localhost
StoragePort=3306
StorageUser=slurm
StoragePass=slurm
StorageLoc=slurm_acct_db

LogFile=/var/log/slurm/slurmdbd.log
PidFile=/run/slurmdbd.pid
