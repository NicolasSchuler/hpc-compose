# Cgroup config tuned for a rootless dev container (no systemd/dbus).
# IgnoreSystemd makes slurmd manage cgroup/v2 directly instead of asking dbus to
# create a systemd scope (which fails with "cannot connect to dbus system
# daemon"). We don't enforce resource constraints in the dev loop, so the
# Constrain* knobs are off. Real clusters keep their own cgroup.conf untouched.
CgroupPlugin=cgroup/v2
IgnoreSystemd=yes
IgnoreSystemdOnFailure=yes
ConstrainCores=no
ConstrainRAMSpace=no
ConstrainDevices=no
