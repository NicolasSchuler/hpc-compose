name: dev-cluster-failing-service

# Negative real-scheduler smoke: proves hpc-compose propagates a service failure
# through the generated batch script, watcher, sacct-backed status, and logs.
runtime:
  backend: host

x-slurm:
  job_name: dev-cluster-failing-service
  time: "00:05:00"
  nodes: 1
  cpus_per_task: 1
  mem: 512M
  cache_dir: ${CACHE_DIR:-/var/cache/hpc-compose}

services:
  app:
    command:
      - /bin/sh
      - -lc
      - |
        echo "intentional dev-cluster failure"
        exit 17
