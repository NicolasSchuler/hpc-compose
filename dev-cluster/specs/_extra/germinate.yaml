name: dev-cluster-germinate

# Canary-rightsize smoke for `germinate`. germinate renders a minimized canary of
# this plan (min cpus/mem, metrics enabled), submits it as a real sbatch, waits
# for it to reach a terminal state, then builds a rightsize report and suggested
# YAML patch from sacct accounting. Lives under _extra/ so the generic up/watch
# loop never runs it (germinate has its own submit-and-analyze flow, not `up`).
# The unit suite only drives the canary planner against fakes; this exercises the
# real submit -> terminal -> sacct rightsize path on the host backend.
runtime:
  backend: host

x-slurm:
  job_name: dev-cluster-germinate
  time: "00:05:00"
  nodes: 1
  cpus_per_task: 2
  mem: 512M
  cache_dir: ${CACHE_DIR:-/var/cache/hpc-compose}

services:
  app:
    command:
      - /bin/sh
      - -lc
      - |
        echo "germinate canary workload"
        sleep 3
