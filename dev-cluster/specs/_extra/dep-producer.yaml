name: dev-cluster-dep-producer

# Producer half of the scheduler inter-job dependency block. Lives under _extra/
# so the generic loop can't run a consumer with an unknown producer id. Runs a
# few seconds then exits 0 so the consumer's afterok dependency is satisfiable.
runtime:
  backend: host

x-slurm:
  job_name: dev-cluster-dep-producer
  time: "00:05:00"
  nodes: 1
  cpus_per_task: 1
  mem: 256M
  cache_dir: ${CACHE_DIR:-/var/cache/hpc-compose}

services:
  app:
    command:
      - /bin/sh
      - -lc
      - |
        echo "producer: working"
        sleep 5
        echo "producer: done"
