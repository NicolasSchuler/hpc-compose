name: dev-cluster-long-running

# Long-lived job used by the cancel -> CANCELLED dedicated block. Lives under
# _extra/ so the generic loop never runs it (it would never drain on its own).
# Its block submits with `up --detach`, waits for RUNNING, then `cancel`s it and
# asserts the real scancel drives sacct to CANCELLED and the tracked metadata is
# removed — the third terminal state the generic harness never produces (the
# unit fake scancel only logs argv and can never yield a real CANCELLED row).
runtime:
  backend: host

x-slurm:
  job_name: dev-cluster-long-running
  time: "00:10:00"
  nodes: 1
  cpus_per_task: 1
  mem: 256M
  cache_dir: ${CACHE_DIR:-/var/cache/hpc-compose}

services:
  app:
    command:
      - /bin/sh
      - -lc
      - |
        echo "long-running: sleeping until cancelled"
        sleep 300
