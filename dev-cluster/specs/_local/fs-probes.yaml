name: dev-cluster-local-fs-probes

# Opt-in local-only input for `preflight --fs-probes`. The service is never
# launched; the command submits its own short `sbatch --wait` probe against the
# configured cache directory.
runtime:
  backend: host

x-slurm:
  job_name: devcluster-fs-probes
  time: "00:01:00"
  nodes: 1
  cpus_per_task: 1
  mem: 128M
  cache_dir: /var/cache/hpc-compose

services:
  app:
    command: /bin/true
