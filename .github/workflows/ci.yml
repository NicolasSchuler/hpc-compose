name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  MDBOOK_VERSION: "0.5.2"

jobs:
  docs:
    name: Docs
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          rustflags: ""

      - name: Install mdBook
        run: |
          curl -fsSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" -o /tmp/mdbook.tar.gz
          tar -xzf /tmp/mdbook.tar.gz -C /tmp
          echo "/tmp" >> "$GITHUB_PATH"

      - name: Build mdBook docs
        run: mdbook build docs

      - name: Build rustdoc
        run: cargo doc --locked --no-deps
        env:
          RUSTFLAGS: -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt
          rustflags: ""

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy
          rustflags: ""

      - name: Run clippy
        run: cargo clippy --all-targets --locked -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          rustflags: ""

      - name: Run test suite
        run: cargo test --locked

      - name: Validate all shipped examples
        run: |
          cargo build --locked
          for f in examples/*.yaml; do
            echo "Validating $f"
            cargo run -- validate -f "$f"
          done
