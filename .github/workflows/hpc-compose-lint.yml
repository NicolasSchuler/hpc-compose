name: hpc-compose lint

# Reusable workflow that installs a pinned hpc-compose release and validates
# and lints a compose file. Consumer repos can call it with:
#
#   jobs:
#     hpc-compose:
#       uses: NicolasSchuler/hpc-compose/.github/workflows/hpc-compose-lint.yml@v0.1.51
#       with:
#         compose-file: compose.yaml
#         version: v0.1.51
#         strict: true
#
# Pin `version` (and the `uses:` ref) to a release tag.

on:
  workflow_call:
    inputs:
      compose-file:
        description: Path to the compose file to validate and lint.
        required: false
        default: compose.yaml
        type: string
      version:
        description: Pinned hpc-compose release tag to install (e.g. v0.1.51).
        required: false
        default: v0.1.51
        type: string
      strict:
        description: When true, lint warnings fail the job (no --allow-warnings).
        required: false
        default: false
        type: boolean

jobs:
  hpc-compose:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - name: Install hpc-compose
        run: |
          set -euo pipefail
          curl -fsSL "https://raw.githubusercontent.com/NicolasSchuler/hpc-compose/${{ inputs.version }}/install.sh" \
            | env HPC_COMPOSE_VERSION="${{ inputs.version }}" sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Validate
        run: hpc-compose validate -f "${{ inputs.compose-file }}"

      - name: Lint
        run: |
          if [ "${{ inputs.strict }}" = "true" ]; then
            hpc-compose lint -f "${{ inputs.compose-file }}"
          else
            hpc-compose lint -f "${{ inputs.compose-file }}" --allow-warnings
          fi
