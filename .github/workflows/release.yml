name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing Git tag to publish release assets for
        required: true
        type: string

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release commit
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          rustflags: ""

      - name: Run test suite
        run: cargo test --locked

  build:
    name: Build ${{ matrix.label }}
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            binary_name: hpc-compose
            label: Linux x86_64
          - runner: macos-15
            target: aarch64-apple-darwin
            binary_name: hpc-compose
            label: macOS arm64
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            binary_name: hpc-compose
            label: macOS x86_64
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            binary_name: hpc-compose.exe
            label: Windows x86_64

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          rustflags: ""

      - name: Build release binary
        run: cargo build --locked --release

      - name: Package Unix release assets
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          version="${RELEASE_TAG}"
          asset="hpc-compose-${version}-${{ matrix.target }}.tar.gz"
          checksum="${asset}.sha256"
          stage_dir="$(mktemp -d)"

          mkdir -p dist
          cp "target/release/${{ matrix.binary_name }}" "${stage_dir}/"
          cp README.md "${stage_dir}/"
          tar -C "${stage_dir}" -czf "dist/${asset}" "${{ matrix.binary_name }}" README.md
          shasum -a 256 "dist/${asset}" > "dist/${checksum}"

      - name: Package Windows release assets
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG
          $asset = "hpc-compose-$version-${{ matrix.target }}.zip"
          $stageDir = Join-Path $env:RUNNER_TEMP "release-package"

          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $PWD "dist") | Out-Null
          Copy-Item "target/release/${{ matrix.binary_name }}" $stageDir
          Copy-Item README.md $stageDir
          Compress-Archive -Path "$stageDir/*" -DestinationPath "dist/$asset"

          $hash = (Get-FileHash "dist/$asset" -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "dist/$asset.sha256" -Value "$hash  $asset"

      - name: Upload packaged assets
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${RELEASE_TAG}"
          gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag}" >/dev/null

          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${tag}" dist/* --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${tag}" dist/* --generate-notes --repo "${GITHUB_REPOSITORY}"
          fi
