name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing Git tag to publish release assets for
        required: true
        type: string

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
  CARGO_DEB_VERSION: "3.6.3"
  CARGO_GENERATE_RPM_VERSION: "0.20.0"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release commit
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          toolchain: stable
          rustflags: ""

      - name: Verify release tag matches Cargo package version
        shell: bash
        run: |
          set -euo pipefail
          crate_version="$(awk '
            BEGIN { in_pkg = 0 }
            $0 == "[package]" { in_pkg = 1; next }
            /^\[/ && in_pkg { in_pkg = 0 }
            in_pkg && $1 == "version" {
              gsub(/"/, "", $3)
              print $3
              exit
            }
          ' Cargo.toml)"
          if [ -z "${crate_version}" ]; then
            echo "failed to read [package].version from Cargo.toml" >&2
            exit 1
          fi
          expected_tag="v${crate_version}"
          if [ "${RELEASE_TAG}" != "${expected_tag}" ]; then
            echo "release tag/version mismatch: RELEASE_TAG=${RELEASE_TAG}, Cargo.toml version=${crate_version}" >&2
            echo "expected release tag ${expected_tag}" >&2
            exit 1
          fi

      - name: Run test suite
        run: cargo test --locked

  build:
    name: Build ${{ matrix.label }}
    needs: verify
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            binary_name: hpc-compose
            label: Linux x86_64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            binary_name: hpc-compose
            label: Linux arm64
          - runner: macos-15
            target: aarch64-apple-darwin
            binary_name: hpc-compose
            label: macOS arm64
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            binary_name: hpc-compose
            label: macOS x86_64
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            binary_name: hpc-compose.exe
            label: Windows x86_64

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          toolchain: stable
          rustflags: ""

      - name: Install Linux musl toolchain
        if: endsWith(matrix.target, '-unknown-linux-musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools pkg-config rpm cpio
          rustup target add ${{ matrix.target }}

      - name: Install Linux packaging tools
        if: endsWith(matrix.target, '-unknown-linux-musl')
        run: |
          cargo install cargo-deb --locked --version "${CARGO_DEB_VERSION}"
          cargo install cargo-generate-rpm --locked --version "${CARGO_GENERATE_RPM_VERSION}"

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package Unix release assets
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          version="${RELEASE_TAG}"
          asset="hpc-compose-${version}-${{ matrix.target }}.tar.gz"
          checksum="${asset}.sha256"
          stage_dir="$(mktemp -d)"

          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "${stage_dir}/"
          cp README.md "${stage_dir}/"
          mkdir -p "${stage_dir}/share/man"
          cp -R man/man1 "${stage_dir}/share/man/"
          tar -C "${stage_dir}" -czf "dist/${asset}" "${{ matrix.binary_name }}" README.md share/man/man1
          hash="$(shasum -a 256 "dist/${asset}" | cut -d ' ' -f 1)"
          printf '%s  %s\n' "${hash}" "${asset}" > "dist/${checksum}"

      - name: Package Linux native assets
        if: endsWith(matrix.target, '-unknown-linux-musl')
        shell: bash
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          target_dir="target/${{ matrix.target }}/release"
          mkdir -p target/release
          cp "${target_dir}/${{ matrix.binary_name }}" target/release/hpc-compose

          deb_suffix="$(dpkg --print-architecture)"
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-musl)
              rpm_arch="x86_64"
              ;;
            aarch64-unknown-linux-musl)
              rpm_arch="aarch64"
              ;;
            *)
              echo "unsupported linux packaging target: ${{ matrix.target }}" >&2
              exit 1
              ;;
          esac

          cargo deb --no-build --no-strip --target "${{ matrix.target }}"
          deb_src="target/${{ matrix.target }}/debian/hpc-compose_${version}-1_${deb_suffix}.deb"
          deb_asset="hpc-compose-${RELEASE_TAG}-${{ matrix.target }}.deb"
          cp "${deb_src}" "dist/${deb_asset}"
          deb_hash="$(shasum -a 256 "dist/${deb_asset}" | cut -d ' ' -f 1)"
          printf '%s  %s\n' "${deb_hash}" "${deb_asset}" > "dist/${deb_asset}.sha256"

          cargo generate-rpm --target "${{ matrix.target }}" --payload-compress gzip
          rpm_src="target/${{ matrix.target }}/generate-rpm/hpc-compose-${version}-1.${rpm_arch}.rpm"
          rpm_asset="hpc-compose-${RELEASE_TAG}-${{ matrix.target }}.rpm"
          cp "${rpm_src}" "dist/${rpm_asset}"
          rpm_hash="$(shasum -a 256 "dist/${rpm_asset}" | cut -d ' ' -f 1)"
          printf '%s  %s\n' "${rpm_hash}" "${rpm_asset}" > "dist/${rpm_asset}.sha256"

      - name: Smoke test Unix release assets
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          version="${RELEASE_TAG}"
          asset="hpc-compose-${version}-${{ matrix.target }}.tar.gz"
          smoke_dir="$(mktemp -d)"

          tar -C "${smoke_dir}" -xzf "dist/${asset}"
          "${smoke_dir}/${{ matrix.binary_name }}" --version >/dev/null
          test -f "${smoke_dir}/share/man/man1/hpc-compose.1"
          test -f "${smoke_dir}/share/man/man1/hpc-compose-up.1"

      - name: Smoke test Linux native assets
        if: endsWith(matrix.target, '-unknown-linux-musl')
        shell: bash
        run: |
          set -euo pipefail

          require_manpage() {
            local root="$1"
            local page="$2"
            local rel="usr/share/man/man1/${page}"

            for suffix in "" ".gz" ".xz" ".bz2" ".zst"; do
              if [ -f "${root}/${rel}${suffix}" ]; then
                return 0
              fi
            done

            echo "missing manpage ${rel} under ${root}" >&2
            find "${root}/usr/share/man/man1" -maxdepth 1 -type f -print | sort >&2 || true
            return 1
          }

          require_rpm_entry() {
            local contents="$1"
            local pattern="$2"

            if grep -Eq "${pattern}" "${contents}"; then
              return 0
            fi

            echo "missing rpm entry matching ${pattern}" >&2
            cat "${contents}" >&2
            return 1
          }

          deb_asset="dist/hpc-compose-${RELEASE_TAG}-${{ matrix.target }}.deb"
          rpm_asset="dist/hpc-compose-${RELEASE_TAG}-${{ matrix.target }}.rpm"
          smoke_dir="$(mktemp -d)"
          deb_root="${smoke_dir}/deb-root"

          dpkg-deb --contents "${deb_asset}" >/dev/null
          dpkg-deb --extract "${deb_asset}" "${deb_root}"
          "${deb_root}/usr/bin/hpc-compose" --version >/dev/null
          require_manpage "${deb_root}" "hpc-compose.1"
          require_manpage "${deb_root}" "hpc-compose-up.1"

          rpm_contents="${smoke_dir}/rpm-contents.txt"
          rpm --query --list --package "${rpm_asset}" >"${rpm_contents}"
          require_rpm_entry "${rpm_contents}" '^/usr/bin/hpc-compose$'
          require_rpm_entry "${rpm_contents}" '^/usr/share/man/man1/hpc-compose\.1(\.(gz|xz|bz2|zst))?$'
          require_rpm_entry "${rpm_contents}" '^/usr/share/man/man1/hpc-compose-up\.1(\.(gz|xz|bz2|zst))?$'

      - name: Package Windows release assets
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG
          $asset = "hpc-compose-$version-${{ matrix.target }}.zip"
          $stageDir = Join-Path $env:RUNNER_TEMP "release-package"

          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $PWD "dist") | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" $stageDir
          Copy-Item README.md $stageDir
          Compress-Archive -Path "$stageDir/*" -DestinationPath "dist/$asset"

          $hash = (Get-FileHash "dist/$asset" -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "dist/$asset.sha256" -Value "$hash  $asset"

      - name: Smoke test Windows release assets
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG
          $asset = "hpc-compose-$version-${{ matrix.target }}.zip"
          $smokeDir = Join-Path $env:RUNNER_TEMP "release-smoke"

          New-Item -ItemType Directory -Force -Path $smokeDir | Out-Null
          Expand-Archive -Path "dist/$asset" -DestinationPath $smokeDir -Force
          & (Join-Path $smokeDir "${{ matrix.binary_name }}") --version | Out-Null

      - name: Attest release assets
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be
        with:
          subject-path: dist/*

      - name: Upload packaged assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Download packaged assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Generate aggregate checksum manifest
        shell: bash
        run: |
          set -euo pipefail

          assets=()
          while IFS= read -r -d '' file; do
            assets+=("${file#dist/}")
          done < <(find dist -maxdepth 1 -type f ! -name '*.sha256' ! -name 'SHA256SUMS' -print0 | sort -z)

          : > dist/SHA256SUMS
          for asset in "${assets[@]}"; do
            hash="$(shasum -a 256 "dist/${asset}" | cut -d ' ' -f 1)"
            printf '%s  %s\n' "${hash}" "${asset}" >> dist/SHA256SUMS
          done

      - name: Prepare release notes inputs
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p .tmp
          git tag -l --format='%(contents)' "${RELEASE_TAG}" > .tmp/tag-release-notes.txt
          if [ ! -s .tmp/tag-release-notes.txt ]; then
            printf '%s\n' "See the tagged commit history for the user-visible changes in this release." > .tmp/tag-release-notes.txt
          fi

          find dist -maxdepth 1 -type f -exec basename {} \; | sort > .tmp/release-assets.txt

      - name: Render release notes
        run: |
          python3 scripts/render_release_notes.py \
            --template .github/RELEASE_TEMPLATE.md \
            --tag "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --assets .tmp/release-assets.txt \
            --notes-file .tmp/tag-release-notes.txt \
            --output .tmp/release-notes.md

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${RELEASE_TAG}"
          gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag}" >/dev/null

          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${tag}" --notes-file .tmp/release-notes.md --repo "${GITHUB_REPOSITORY}"
            gh release upload "${tag}" dist/* --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${tag}" dist/* --notes-file .tmp/release-notes.md --repo "${GITHUB_REPOSITORY}"
          fi

  homebrew-formula-refresh:
    name: Refresh Homebrew formula
    needs: publish
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: main

      - name: Download packaged assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Generate aggregate checksum manifest
        shell: bash
        run: |
          set -euo pipefail

          assets=()
          while IFS= read -r -d '' file; do
            assets+=("${file#dist/}")
          done < <(find dist -maxdepth 1 -type f ! -name '*.sha256' ! -name 'SHA256SUMS' -print0 | sort -z)

          : > dist/SHA256SUMS
          for asset in "${assets[@]}"; do
            hash="$(shasum -a 256 "dist/${asset}" | cut -d ' ' -f 1)"
            printf '%s  %s\n' "${hash}" "${asset}" >> dist/SHA256SUMS
          done

      - name: Update Homebrew formula
        shell: bash
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          arm64_asset="hpc-compose-${RELEASE_TAG}-aarch64-apple-darwin.tar.gz"
          x86_64_asset="hpc-compose-${RELEASE_TAG}-x86_64-apple-darwin.tar.gz"
          arm64_sha="$(awk -v asset="${arm64_asset}" '$2 == asset { print $1 }' dist/SHA256SUMS)"
          x86_64_sha="$(awk -v asset="${x86_64_asset}" '$2 == asset { print $1 }' dist/SHA256SUMS)"

          [ -n "${arm64_sha}" ] || { echo "missing checksum for ${arm64_asset}" >&2; exit 1; }
          [ -n "${x86_64_sha}" ] || { echo "missing checksum for ${x86_64_asset}" >&2; exit 1; }

          python3 scripts/update_homebrew_formula.py \
            --version "${version}" \
            --arm64-sha256 "${arm64_sha}" \
            --x86-64-sha256 "${x86_64_sha}"

      - name: Open formula refresh pull request
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- Formula/hpc-compose.rb; then
            echo "Formula already up to date"
            exit 0
          fi

          branch="release/homebrew-formula-${RELEASE_TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "${branch}"
          git add Formula/hpc-compose.rb
          git commit -m "Update Homebrew formula for ${RELEASE_TAG}"
          git push --force origin "${branch}"

          pr_body="Refresh \`Formula/hpc-compose.rb\` to point at the macOS release tarballs for ${RELEASE_TAG}."
          pr_url="https://github.com/${GITHUB_REPOSITORY}/pull/new/${branch}"

          pr_number=""
          if ! pr_number="$(gh pr list \
            --repo "${GITHUB_REPOSITORY}" \
            --head "${branch}" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number')"; then
            echo "::warning::Unable to inspect existing Homebrew formula PRs. Branch ${branch} was pushed; open or update the PR manually at ${pr_url}."
          fi

          if [ -n "${pr_number}" ]; then
            if ! gh pr edit "${pr_number}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Update Homebrew formula for ${RELEASE_TAG}" \
              --body "${pr_body}"; then
              echo "::warning::Unable to update Homebrew formula PR #${pr_number}. Branch ${branch} was pushed; update the PR manually at ${pr_url}."
            fi
          else
            if ! gh pr create \
              --repo "${GITHUB_REPOSITORY}" \
              --base main \
              --head "${branch}" \
              --title "Update Homebrew formula for ${RELEASE_TAG}" \
              --body "${pr_body}"; then
              echo "::warning::Unable to create Homebrew formula PR. Branch ${branch} was pushed; open the PR manually at ${pr_url}."
            fi
          fi
