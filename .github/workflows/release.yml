name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing Git tag to publish release assets for
        required: true
        type: string

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release commit
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          toolchain: stable
          rustflags: ""

      - name: Run test suite
        run: cargo test --locked

  build:
    name: Build ${{ matrix.label }}
    needs: verify
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            binary_name: hpc-compose
            label: Linux x86_64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            binary_name: hpc-compose
            label: Linux arm64
          - runner: macos-15
            target: aarch64-apple-darwin
            binary_name: hpc-compose
            label: macOS arm64
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            binary_name: hpc-compose
            label: macOS x86_64
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            binary_name: hpc-compose.exe
            label: Windows x86_64

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          toolchain: stable
          rustflags: ""

      - name: Install Linux musl toolchain
        if: endsWith(matrix.target, '-unknown-linux-musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools pkg-config
          rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package Unix release assets
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          version="${RELEASE_TAG}"
          asset="hpc-compose-${version}-${{ matrix.target }}.tar.gz"
          checksum="${asset}.sha256"
          stage_dir="$(mktemp -d)"

          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "${stage_dir}/"
          cp README.md "${stage_dir}/"
          mkdir -p "${stage_dir}/share/man"
          cp -R man/man1 "${stage_dir}/share/man/"
          tar -C "${stage_dir}" -czf "dist/${asset}" "${{ matrix.binary_name }}" README.md share/man/man1
          hash="$(shasum -a 256 "dist/${asset}" | cut -d ' ' -f 1)"
          printf '%s  %s\n' "${hash}" "${asset}" > "dist/${checksum}"

      - name: Smoke test Unix release assets
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          version="${RELEASE_TAG}"
          asset="hpc-compose-${version}-${{ matrix.target }}.tar.gz"
          smoke_dir="$(mktemp -d)"

          tar -C "${smoke_dir}" -xzf "dist/${asset}"
          "${smoke_dir}/${{ matrix.binary_name }}" --version >/dev/null
          test -f "${smoke_dir}/share/man/man1/hpc-compose.1"
          test -f "${smoke_dir}/share/man/man1/hpc-compose-submit.1"

      - name: Package Windows release assets
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG
          $asset = "hpc-compose-$version-${{ matrix.target }}.zip"
          $stageDir = Join-Path $env:RUNNER_TEMP "release-package"

          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $PWD "dist") | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" $stageDir
          Copy-Item README.md $stageDir
          Compress-Archive -Path "$stageDir/*" -DestinationPath "dist/$asset"

          $hash = (Get-FileHash "dist/$asset" -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "dist/$asset.sha256" -Value "$hash  $asset"

      - name: Smoke test Windows release assets
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG
          $asset = "hpc-compose-$version-${{ matrix.target }}.zip"
          $smokeDir = Join-Path $env:RUNNER_TEMP "release-smoke"

          New-Item -ItemType Directory -Force -Path $smokeDir | Out-Null
          Expand-Archive -Path "dist/$asset" -DestinationPath $smokeDir -Force
          & (Join-Path $smokeDir "${{ matrix.binary_name }}") --version | Out-Null

      - name: Attest release assets
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be
        with:
          subject-path: dist/*

      - name: Upload packaged assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${RELEASE_TAG}"
          gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag}" >/dev/null

          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${tag}" dist/* --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${tag}" dist/* --generate-notes --repo "${GITHUB_REPOSITORY}"
          fi
