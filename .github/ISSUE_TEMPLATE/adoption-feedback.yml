name: Adoption feedback / cluster fit
description: Share how hpc-compose fit, failed to fit, or stalled on a real cluster workflow.
title: "[adoption] "
labels:
  - feedback
body:
  - type: markdown
    attributes:
      value: |
        Use this form when you tried to map hpc-compose onto a cluster or workload and want to report fit, friction, or blockers. For a concrete reproducible defect, use the bug report form instead.
  - type: dropdown
    id: adoption_status
    attributes:
      label: Adoption status
      description: Where did this feedback come from?
      options:
        - Trying it now
        - Blocked before first run
        - Ran a first job
        - Decided not to adopt
        - Using it successfully
    validations:
      required: true
  - type: textarea
    id: cluster_type
    attributes:
      label: Cluster type
      description: What kind of cluster or environment are you using?
      placeholder: Slurm version, Linux distro, Enroot/Pyxis notes, shared storage layout
    validations:
      required: true
  - type: textarea
    id: workload_type
    attributes:
      label: Workload type
      description: What kind of job were you trying to run?
      placeholder: training, inference, ETL, MPI, database + worker, etc.
    validations:
      required: true
  - type: textarea
    id: friction_point
    attributes:
      label: Main failure or friction point
      description: What was the single biggest thing that slowed you down or blocked adoption?
      placeholder: authoring mismatch, unsupported Compose behavior, preflight issue, cluster-specific runtime problem, docs gap
    validations:
      required: true
  - type: textarea
    id: desired_outcome
    attributes:
      label: Desired outcome
      description: What would have made this workflow feel successful?
      placeholder: supported backend, clearer docs, different spec shape, better preflight guidance, more examples
    validations:
      required: false
  - type: textarea
    id: detail
    attributes:
      label: Extra detail
      description: Share logs, commands, example specs, or any context that would make the report actionable.
    validations:
      required: false
